server {
    listen 80;
    server_name explorer.polkadex.ee;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Check if traffic is coming from a proxy (like Cloudflare) that already did HTTPS
        set $do_redirect 0;
        if ($http_x_forwarded_proto != "https") {
            set $do_redirect 1;
        }
        # If it's a direct HTTP hit (no proxy), redirect to HTTPS
        if ($do_redirect = 1) {
            return 301 https://$host$request_uri;
        }

        # Otherwise serve the content directly (Cloudflare Flexible SSL)
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name explorer.polkadex.ee;

    ssl_certificate /etc/letsencrypt/live/explorer.polkadex.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.polkadex.ee/privkey.pem;
    
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
