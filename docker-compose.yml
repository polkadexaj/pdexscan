version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pdexplorer-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - cache_data:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pdexplorer-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  cache_data:
